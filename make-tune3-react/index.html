<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make Tunes</title>
    <style>
      :root {
        --shell-bg-floor: #020607;
        --shell-bg-top: #1a2a2c;
        --shell-border: rgba(255, 255, 255, 0.1);
        --shell-text: #eeeeee;
        --shell-accent: #ef7b3a;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--shell-bg-floor);
      }

      body {
        min-width: 320px;
        font-family: Inter, system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .app-boot-shell {
        position: relative;
        min-height: 100vh;
        color: var(--shell-text);
        background:
          radial-gradient(circle at top right, var(--shell-bg-top) 0%, var(--shell-bg-floor) 68%);
        overflow: hidden;
      }

      .app-boot-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(48, 113, 113, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(48, 113, 113, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      .app-boot-shell__header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        padding: 6px 10px;
        border-bottom: 1px solid var(--shell-border);
        background: linear-gradient(180deg, #1e2f2f, #0f1a1a);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      .app-boot-shell__logo {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .app-boot-shell__logo-main {
        color: var(--shell-text);
      }

      .app-boot-shell__logo-accent {
        color: var(--shell-accent);
      }

      .app-boot-shell__body {
        position: relative;
        z-index: 1;
        min-height: calc(100vh - 36px);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-boot-shell__spinner {
        width: 32px;
        height: 32px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top-color: #d55f21;
        border-radius: 50%;
        animation: spinner-spin 0.8s linear infinite;
      }

      @keyframes spinner-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-shell" aria-hidden="true">
        <header class="app-boot-shell__header">
          <h1 class="app-boot-shell__logo">
            <span class="app-boot-shell__logo-main">Make </span>
            <span class="app-boot-shell__logo-accent">Tunes</span>
          </h1>
        </header>
        <div class="app-boot-shell__body">
          <div class="app-boot-shell__spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
